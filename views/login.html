<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your Membership Engine account">
    <title>Login - MemberEngine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <span class="brand-icon">⚡</span>
            MemberEngine
        </a>
        <div class="nav-links" id="navLinks"></div>
        <div class="nav-actions" id="navActions"></div>
    </nav>

    <div class="page-wrapper">
        <div class="container">
            <div class="form-container" style="padding-top: 4rem;">
                <div class="form-card">
                    <h2>Welcome Back</h2>
                    <p class="form-subtitle">Sign in to access your dashboard</p>

                    <div id="alertContainer"></div>

                    <form id="loginForm">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="you@example.com" required
                                autocomplete="email">
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Enter your password"
                                required autocomplete="current-password">
                        </div>

                        <button type="submit" id="loginBtn" class="btn btn-primary btn-block btn-lg"
                            style="margin-top: 0.5rem;">
                            Sign In
                        </button>
                    </form>

                    <div class="form-footer">
                        Don't have an account? <a href="/register">Create one</a>
                    </div>

                    <!-- Test credentials -->
                    <div
                        style="margin-top: 1.5rem; padding: 1rem; background: var(--bg-glass); border-radius: var(--radius-sm); border: 1px solid var(--border-subtle);">
                        <p
                            style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 600;">
                            TEST CREDENTIALS</p>
                        <p style="font-size: 0.78rem; color: var(--text-secondary);">
                            Admin: <code style="color: var(--text-accent);">vishwa@example.com</code><br>
                            User: <code style="color: var(--text-accent);">vishwa@example.com</code><br>
                            Password: <code style="color: var(--text-accent);">vishwa123</code>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (isAuthenticated()) {
            window.location.href = '/dashboard';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Signing in...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const { status, data } = await apiRequest('/auth/login', {
                method: 'POST',
                body: JSON.stringify({ email, password })
            });

            if (data.success) {
                saveAuth(data.data.token, data.data.user);
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 800);
            } else {
                const msg = data.errors
                    ? data.errors.map(e => e.msg).join(', ')
                    : data.error?.message || 'Login failed.';
                showAlert(msg, 'danger');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
