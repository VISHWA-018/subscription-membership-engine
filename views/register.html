<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your Membership Engine account">
    <title>Register - MemberEngine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <span class="brand-icon">⚡</span>
            MemberEngine
        </a>
        <div class="nav-links" id="navLinks"></div>
        <div class="nav-actions" id="navActions"></div>
    </nav>

    <div class="page-wrapper">
        <div class="container">
            <div class="form-container" style="padding-top: 4rem;">
                <div class="form-card">
                    <h2>Create Account</h2>
                    <p class="form-subtitle">Join MemberEngine and pick your plan</p>

                    <div id="alertContainer"></div>

                    <form id="registerForm">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" placeholder="John Doe" required minlength="2"
                                maxlength="100">
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="you@example.com" required
                                autocomplete="email">
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password"
                                placeholder="Min 6 characters with a number" required minlength="6"
                                autocomplete="new-password">
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword"
                                placeholder="Re-enter your password" required autocomplete="new-password">
                        </div>

                        <button type="submit" id="registerBtn" class="btn btn-primary btn-block btn-lg"
                            style="margin-top: 0.5rem;">
                            Create Account
                        </button>
                    </form>

                    <div class="form-footer">
                        Already have an account? <a href="/login">Sign in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (isAuthenticated()) {
            window.location.href = '/dashboard';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('registerBtn');
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Client-side validation
            if (password !== confirmPassword) {
                showAlert('Passwords do not match.', 'danger');
                return;
            }

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters.', 'danger');
                return;
            }

            if (!/\d/.test(password)) {
                showAlert('Password must contain at least one number.', 'danger');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creating account...';

            const { status, data } = await apiRequest('/auth/register', {
                method: 'POST',
                body: JSON.stringify({ name, email, password })
            });

            if (data.success) {
                showAlert('Account created successfully! Redirecting to login...', 'success');
                setTimeout(() => window.location.href = '/login', 1500);
            } else {
                const msg = data.errors
                    ? data.errors.map(e => e.msg).join(', ')
                    : data.error?.message || 'Registration failed.';
                showAlert(msg, 'danger');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>

</html>
